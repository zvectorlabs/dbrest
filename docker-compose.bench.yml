services:
  postgres:
    image: postgres:17
    container_name: pgrest-bench-postgres
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    volumes:
      - ./tests/fixtures/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./benches/fixtures/seed_data.sql:/docker-entrypoint-initdb.d/02-seed_data.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '${POSTGRES_CPU_LIMIT:-0.5}'
          memory: ${POSTGRES_MEMORY_LIMIT:-512M}
        reservations:
          cpus: '${POSTGRES_CPU_LIMIT:-0.5}'
          memory: ${POSTGRES_MEMORY_LIMIT:-512M}
    networks:
      - pgrest-bench

  pgrest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pgrest-bench-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGREST_CONFIG: /app/config/bench.toml
      PGREST_DB_URI: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}
      PGREST_SERVER_PORT: 3000
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '${PGREST_CPU_LIMIT:-0.5}'
          memory: ${PGREST_MEMORY_LIMIT:-512M}
        reservations:
          cpus: '${PGREST_CPU_LIMIT:-0.5}'
          memory: ${PGREST_MEMORY_LIMIT:-512M}
    networks:
      - pgrest-bench

networks:
  pgrest-bench:
    driver: bridge
